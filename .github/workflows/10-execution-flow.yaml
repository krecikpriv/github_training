name: 10 - 01 – Controlling the Execution Flow
on:
  workflow_dispatch:
    inputs:
      pass-unit-tests:
        description: 'pass-unit-tests'
        type: boolean
        default: false

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - name: Lint and build
        run: echo "Linting and building project"
  unit-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    needs: lint-build
    steps:
      - name: Running unit tests
        run: echo "Running tests..."
      - name: Failing tests
        if: ${{ inputs.pass-unit-tests == false }}
        run: exit 1
  deploy-nonprod:
    runs-on: ubuntu-latest
    needs: [lint-build, unit-tests]
    if: ${{ needs.unit-tests.result == 'success' && needs.lint-build.result == 'success' }}
    steps:
      - name: Deploying to non-prod
        run: echo "Deploying to non-prod environment"
  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    if: ${{ needs.deploy-nonprod.result == 'success' }}
    steps:
      - name: Running end-to-end tests
        run: echo "Running end-to-end tests..."
  load-tests:
    runs-on: ubuntu-latest
    needs: deploy-nonprod
    if: ${{ needs.deploy-nonprod.result == 'success' }}
    steps:
      - name: Running load tests
        run: echo "Running load tests..."
  deploy-prod:
    runs-on: ubuntu-latest
    needs: [e2e-tests, load-tests]
    if: ${{ needs.e2e-tests.result == 'success' && needs.load-tests.result == 'success' }}
    steps:
      - name: Deploying to production
        run: echo "Deploying to production environment"