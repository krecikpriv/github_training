---
name: 07-02b Pogoda API CI
on:
  #push:
  #  branches: [ main, feature/07-pogoda-api ]
  pull_request:
    branches: [ feature/07-pogoda-api ]
  workflow_dispatch:

env:
  WORKDIR: ./szkolenie/Ćwiczenia/06-context/pogoda_python_flusk
  TEST_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/python_pogoda:test_pm
  HUB_IMAGE_BASE: ${{ secrets.DOCKERHUB_USERNAME }}/python_pogoda_16_03_2026
  DEPLOY_ENV: ${{ github.ref == 'refs/heads/main' && 'prod07' || 'dev07' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ env.WORKDIR }}
        push: false
        tags: ${{ env.TEST_IMAGE }}
        load: true
    - name: Save image to tar
      run: docker save ${{ env.TEST_IMAGE }} -o image.tar
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: pogoda-image
        path: image.tar
  test:
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name == 'pull_request'


    env:
      OPENWEATHER_API_KEY: ${{ secrets.MY_API_KEY_W }}

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: pogoda-image

    - name: Load Docker image
      run: docker load -i image.tar

    - name: Validate application
      if: env.OPENWEATHER_API_KEY == ''
      run: |
          echo "❌ Brak sekretu OPENWEATHER_API_KEY – testy API nie mogą zostać uruchomione."
          exit 1
    - name: Run API tests
      if: env.OPENWEATHER_API_KEY != ''
      run: |
          echo "✅ Sekret OPENWEATHER_API_KEY jest dostępny – uruchamiam testy API."
          docker run -d \
            --name pogoda_api \
            -p 8000:8000 \
            -e OPENWEATHER_API_KEY="${{ env.OPENWEATHER_API_KEY }}" \
            "${{ env.TEST_IMAGE }}"
    
    - name: Wait for API
      if: env.OPENWEATHER_API_KEY != ''
      run: |
          echo "✅ Sekret OPENWEATHER_API_KEY jest dostępny – czekam na API."
          sleep 10
    
    - name: Test endpoint
      if: env.OPENWEATHER_API_KEY != ''
      run: |
          set -e
          echo "Testowanie endpointu /weather..."
          curl -f "http://localhost:8000/weather?city=Warsaw&api_key=${{ env.OPENWEATHER_API_KEY }}"
          echo
          echo "OK - endpoint /weather zwrócił odpowiedź 2xx."
    - name: failure
      if: failure() 
      run: |
          echo "Logi kontenera:"
          docker logs pogoda_api || true
    
    - name: Stop and remove container
      if: always()
      run: |
          docker stop pogoda_api || true
          docker rm pogoda_api || true
  
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: >
        github.event_name == 'push' &&
        github.ref == 'refs/heads/main' &&
        github.event.repository.fork == false
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6 
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ${{ env.WORKDIR }}
        push: true
        tags: |
            ${{ env.HUB_IMAGE_BASE }}:latest
            ${{ env.HUB_IMAGE_BASE }}:${{ github.sha }}
            ${{ env.HUB_IMAGE_BASE }}:${{ github.ref_name }}
            ${{ env.HUB_IMAGE_BASE }}:${{ env.DEPLOY_ENV }}